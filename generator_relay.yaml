# ==============================================================================
# ESPHOME GENERATOR RELAY CONTROL CONFIGURATION
# ==============================================================================
# Device: ESP32-based 8-channel relay controller for generator automation
# Hardware: ESP32 development board + 8-relay module
# Purpose: Automated control of a backup generator including:
#          - Starting/stopping the engine
#          - Throttle linkage adjustment
#          - Block heater control
#          - Fuel level monitoring (ultrasonic sensor)
# ==============================================================================
# SAFETY WARNING:
# This configuration controls a potentially dangerous gasoline/diesel generator.
# Improper configuration or wiring can cause:
# - Engine damage from over-cranking
# - Fire hazard from heaters
# - Carbon monoxide poisoning if run indoors
# - Personal injury from moving parts
# 
# ALWAYS:
# - Test thoroughly in safe conditions before deployment
# - Include manual shutoff switches as backup
# - Install proper ventilation and CO detectors
# - Follow generator manufacturer's safety guidelines
# - Never run generator indoors or in enclosed spaces
# ==============================================================================

# ==============================================================================
# ESPHOME CORE CONFIGURATION
# ==============================================================================
esphome:
  name: generator-relay                  # Device identifier for ESPHome dashboard
                                         # Used for mDNS hostname (generator-relay.local)
  friendly_name: Generator_Relay         # Human-readable name in Home Assistant UI
                                         # Appears as device name in HA entities

# ==============================================================================
# ESP32 HARDWARE CONFIGURATION
# ==============================================================================
# Specifies the microcontroller board type and compilation framework
# ==============================================================================
esp32:
  board: esp32dev                        # Generic ESP32 development board
                                         # Compatible with most ESP32 boards:
                                         # - ESP32-WROOM
                                         # - ESP32-DevKitC
                                         # - NodeMCU-32S
                                         # - Most generic ESP32 dev boards
  framework:
    type: arduino                        # Use Arduino framework for compilation
                                         # Arduino = easier development, more libraries
                                         # Alternative: esp-idf (more advanced/complex)

# ==============================================================================
# LOGGING
# ==============================================================================
# Enables serial logging for debugging and monitoring
# View logs via USB serial connection or OTA wireless logs in ESPHome
# ==============================================================================
logger:                                  # Default logging configuration
                                         # Level: DEBUG (shows all messages)
                                         # Output: USB serial @ 115200 baud
                                         # Logs show relay activations, WiFi status, etc.
                                         # Useful for troubleshooting generator control

# ==============================================================================
# HOME ASSISTANT API
# ==============================================================================
# Establishes encrypted connection to Home Assistant for:
# - Entity exposure (switches, sensors)
# - Real-time state updates
# - Remote control via HA dashboard
# - Automation integration
# ==============================================================================
api:
  encryption:
    key: "EpX1m10fsJ8ZsjDTuzBwDbAzurhJ7xxSTfEDVU4LR2E="
                                         # AES encryption key for API communication
                                         # Generated by ESPHome, unique per device
                                         # Required for Home Assistant integration
                                         # Keep this key secure - needed to connect to HA

# ==============================================================================
# OTA (OVER-THE-AIR) UPDATES
# ==============================================================================
# Allows wireless firmware updates without USB cable connection
# Essential for deployed devices in remote locations (like generator sheds)
# ==============================================================================
ota:
  - platform: esphome                    # Use ESPHome's native OTA system
    password: "bea1b0212be57697e33c9b635d26be79"
                                         # Password required for firmware uploads
                                         # Prevents unauthorized firmware modifications
                                         # Change this from default for security!

# ==============================================================================
# WIFI CONFIGURATION
# ==============================================================================
# Network settings for connecting to WiFi and Home Assistant
# Static IP recommended for relay controllers (reliable, fast reconnection)
# ==============================================================================
wifi:
  # Static IP configuration (recommended for automation hardware)
  manual_ip:
    static_ip: 10.10.30.13               # Fixed IP address for this relay controller
                                         # Easier to find device on network
                                         # Faster boot (no DHCP negotiation)
                                         # Must be outside DHCP range to avoid conflicts
    gateway: 10.10.30.1                  # Router/gateway IP address
                                         # Usually ends in .1 for home routers
    subnet: 255.255.255.0                # Subnet mask (255.255.255.0 = /24 network)
                                         # Standard for most home/small office networks
    dns1: 10.10.10.10                    # Primary DNS server
                                         # Possibly local DNS server or Pi-hole
    dns2: 10.10.30.1                     # Secondary DNS server (fallback)
                                         # Using router as backup DNS
  
  # WiFi credentials stored in secrets.yaml file
  # This keeps sensitive information separate from main config
  ssid: !secret wifi_ssid_design         # WiFi network name (SSID)
                                         # !secret pulls value from secrets.yaml
                                         # Keeps WiFi credentials out of version control
  password: !secret wifi_password_design # WiFi password
                                         # Also stored in secrets.yaml

  # Fallback Access Point (AP mode if WiFi connection fails)
  # Creates emergency WiFi network for troubleshooting/reconfiguration
  ap:
    ssid: "Generator-Relay Fallback Hotspot"
                                         # Hotspot name when in AP mode
                                         # Appears if device can't connect to main WiFi
                                         # Useful if generator is in remote location
    password: "yWxQXgQTTliv"             # Password for fallback hotspot
                                         # Connect to this network to reconfigure WiFi
                                         # Access web interface at http://192.168.4.1

# ==============================================================================
# CAPTIVE PORTAL
# ==============================================================================
# Provides web-based WiFi configuration when in fallback AP mode
# Automatically opens configuration page when connected to fallback hotspot
# ==============================================================================
captive_portal:                          # Enables captive portal (like hotel WiFi login)
                                         # Browser automatically redirects to config page
                                         # Allows WiFi reconfiguration without reflashing
                                         # Essential for field deployment/troubleshooting

# ==============================================================================
# STATUS LED INDICATOR
# ==============================================================================
# Visual indicator of ESP32 operational status
# Helps diagnose connectivity and operational issues at a glance
# ==============================================================================
light:
  - platform: status_led                 # Special LED that shows ESP32 status
    name: "RelayBoard LED"               # Name exposed to Home Assistant
    restore_mode: ALWAYS_ON              # LED behavior after power cycle/reboot
                                         # ALWAYS_ON = LED on when ESP32 running
                                         # Other options: ALWAYS_OFF, RESTORE_DEFAULT_OFF
    pin:
      number: GPIO23                     # GPIO pin connected to onboard LED
                                         # Many ESP32 boards have LED on GPIO2 or GPIO23
                                         # Check your specific board schematic
                                         # LED behavior:
                                         # - Solid ON = connected to WiFi and HA
                                         # - Slow blink = WiFi connected, HA disconnected
                                         # - Fast blink = WiFi disconnecting/reconnecting
                                         # - OFF = no power or boot failure

# ==============================================================================
# RELAY OUTPUT SWITCHES
# ==============================================================================
# 8-channel relay module controls for generator automation
# Each relay is exposed as a switch entity in Home Assistant
# 
# RELAY WIRING NOTES:
# - Most 8-relay modules are ACTIVE LOW (relay energizes when GPIO is LOW)
# - Ensure relay module power supply matches requirements (usually 5V or 12V)
# - Use optical isolation between ESP32 and relay coils
# - Connect relay module VCC/GND separately (don't use ESP32 3.3V - insufficient current)
# - Generator control wiring should use appropriate gauge wire and fusing
# 
# TIMING CONSIDERATIONS:
# - Starter motor: Limited crank time prevents starter damage (5 seconds max)
# - Stop solenoid: Held for 2.5 seconds to ensure engine shutdown
# - Throttle adjustment: 1.8 seconds allows mechanical linkage to complete travel
# - All auto-off delays prevent relay coil overheating and mechanical wear
# ==============================================================================

switch:
  # ============================================================================
  # RELAY 1 - TENSION THROTTLE LINKAGE
  # ============================================================================
  # Controls motor/solenoid that tightens throttle cable tension
  # Purpose: Adjust engine RPM upward or set throttle to run position
  # Mechanical Action: Pulls throttle cable tighter (increases engine speed)
  # ============================================================================
  - platform: gpio                       # GPIO-controlled relay switch
    pin: GPIO32                          # ESP32 pin connected to relay 1 input
    name: Set_Throttle                   # Name in Home Assistant
    id: relay1                           # Internal reference ID for automation
    icon: mdi:arrow-expand-horizontal    # Material Design Icon (horizontal arrows)
                                         # Visual indicator in HA dashboard
    # Alternative icon (commented out):
    #icon: mdi:engine                    # Engine icon alternative
    
    # Auto-off timer to prevent over-tensioning and motor burnout
    on_turn_on:
      - delay: 1800ms                    # Wait 1.8 seconds (1800 milliseconds)
                                         # Timing based on mechanical travel distance
                                         # Allows throttle linkage to reach full travel
                                         # Prevents motor from stalling at end of travel
      - switch.turn_off: relay1          # Automatically turn off relay after delay
                                         # CRITICAL: Prevents motor burnout from continuous run
                                         # Protects mechanical components from over-stress

  # ============================================================================
  # RELAY 2 - LOOSEN THROTTLE LINKAGE
  # ============================================================================
  # Controls motor/solenoid that loosens throttle cable tension
  # Purpose: Reduce engine RPM or return throttle to idle position
  # Mechanical Action: Releases throttle cable (decreases engine speed)
  # ============================================================================
  - platform: gpio
    pin: GPIO33                          # ESP32 pin connected to relay 2 input
    name: Untension_Throttle             # Name in Home Assistant
    id: relay2                           # Internal reference ID
    icon: mdi:format-horizontal-align-center
                                         # Centered alignment icon (return to center)
    # Alternative icon (commented out):
    #icon: mdi:sync                      # Sync/reset icon alternative
    
    # Auto-off timer (same as relay 1)
    on_turn_on:
      - delay: 1800ms                    # 1.8 second travel time
                                         # Matches Relay 1 timing for symmetrical operation
      - switch.turn_off: relay2          # Auto-off to prevent motor damage
    
    # NOTE: Relay 1 and Relay 2 should NEVER be energized simultaneously
    # This would create opposing mechanical forces and damage the linkage
    # Implement interlocking logic in Home Assistant automation if needed

  # ============================================================================
  # RELAY 3 - UNUSED / SPARE
  # ============================================================================
  # Available for future expansion or additional generator controls
  # Possible uses: Fuel pump, transfer switch, alarm horn, etc.
  # ============================================================================
  - platform: gpio
    pin: GPIO25                          # ESP32 pin connected to relay 3 input
    name: relay 3                        # Generic name (rename when used)
    id: relay3                           # Internal reference ID
    # No icon specified (will use default switch icon)
    # No auto-off timer (add if needed for specific application)

  # ============================================================================
  # RELAY 4 - UNUSED / SPARE
  # ============================================================================
  # Available for future expansion
  # ============================================================================
  - platform: gpio
    pin: GPIO26                          # ESP32 pin connected to relay 4 input
    name: relay 4                        # Generic name (rename when used)
    id: relay4                           # Internal reference ID

  # ============================================================================
  # RELAY 5 - BLOCK HEATER #1
  # ============================================================================
  # Controls first engine block heater for cold weather operation
  # Purpose: Pre-warm engine block to ensure reliable cold-weather starting
  # Typical Usage: Turn on 1-2 hours before planned generator start in winter
  # Power: Usually 120V AC heater element (controlled via relay)
  # ============================================================================
  - platform: gpio
    pin: GPIO27                          # ESP32 pin connected to relay 5 input
    name: Heater_1                       # Name in Home Assistant
    id: relay5                           # Internal reference ID
    icon: mdi:radiator                   # Radiator/heater icon
    
    # NO AUTO-OFF TIMER - Heater runs until manually turned off
    # WARNING: Ensure generator shutdown (relay 7) turns off heaters
    # Leaving heaters on when generator runs wastes power and may overheat
    # Consider adding automation to turn off heaters after generator starts

  # ============================================================================
  # RELAY 6 - BLOCK HEATER #2
  # ============================================================================
  # Controls second engine block heater (redundancy or larger engine)
  # Purpose: Additional heating capacity for very cold climates or large engines
  # Some generators have multiple heater elements for faster warm-up
  # ============================================================================
  - platform: gpio
    pin: GPIO14                          # ESP32 pin connected to relay 6 input
    name: Heater_1                       # Name in Home Assistant
                                         # NOTE: This has same name as relay5 (Heater_1)
                                         # RECOMMENDATION: Change to "Heater_2" to avoid confusion
    id: relay6                           # Internal reference ID
    icon: mdi:radiator                   # Radiator/heater icon
    
    # NO AUTO-OFF TIMER - Same considerations as Heater_1
    # Both heaters can run simultaneously for maximum heating

  # ============================================================================
  # RELAY 7 - STOP GENERATOR (KILL SWITCH)
  # ============================================================================
  # Controls engine stop solenoid or ignition cutoff
  # Purpose: Shuts down generator engine safely
  # Mechanical Action: Typically grounds ignition or activates stop solenoid
  # CRITICAL SAFETY FUNCTION
  # ============================================================================
  - platform: gpio
    pin: GPIO12                          # ESP32 pin connected to relay 7 input
    name: Stop_Generator                 # Name in Home Assistant
    id: relay7                           # Internal reference ID
    icon: mdi:engine-off-outline         # Engine OFF icon (outline style)
    
    # Auto-off sequence with heater shutdown
    on_turn_on:
      - delay: 2500ms                    # Hold stop signal for 2.5 seconds
                                         # Ensures engine fully stops before releasing
                                         # Some engines need sustained signal to shutdown
                                         # Prevents "sputtering" or incomplete shutdown
      - switch.turn_off: relay5          # Turn off Heater_1 after engine stops
                                         # SAFETY: Heaters should not run with engine off
                                         # Prevents wasted power and potential overheating
                                         # NOTE: This only turns off relay5 (Heater_1)
                                         # MISSING: Should also turn off relay6 (Heater_2)
                                         # RECOMMENDATION: Add "switch.turn_off: relay6"
    
    # SAFETY CONSIDERATION:
    # This relay must be fail-safe - if ESP32 loses power, generator should stop
    # Consider using normally-closed relay configuration if possible
    # Add manual kill switch as backup safety mechanism

  # ============================================================================
  # RELAY 8 - START GENERATOR (STARTER MOTOR)
  # ============================================================================
  # Controls starter motor solenoid to crank engine
  # Purpose: Engages starter motor to start generator engine
  # Mechanical Action: Energizes starter solenoid, cranks engine
  # CRITICAL: Limited crank time prevents starter motor damage
  # ============================================================================
  - platform: gpio
    pin: GPIO13                          # ESP32 pin connected to relay 8 input
    name: Starter                        # Name in Home Assistant
    id: relay8                           # Internal reference ID
    icon: mdi:engine-outline             # Engine icon (outline style)
    
    # Auto-off timer - CRITICAL FOR STARTER PROTECTION
    on_turn_on:
      - delay: 5000ms                    # Maximum crank time: 5 seconds
                                         # MANUFACTURER WARNING: Most generators specify
                                         # maximum 5-15 second continuous cranking
                                         # Longer cranking can:
                                         # - Overheat starter motor
                                         # - Drain battery excessively
                                         # - Damage starter gear/flywheel ring gear
                                         # - Flood engine with fuel
      - switch.turn_off: relay8          # Automatically release starter after 5 sec
                                         # MANDATORY: Prevents starter damage
    
    # STARTING SEQUENCE RECOMMENDATIONS:
    # 1. Turn on heaters (relay5, relay6) 1-2 hours before start (cold weather)
    # 2. Ensure throttle is in start position (relay1 or relay2 as needed)
    # 3. Activate starter (relay8) - auto-releases after 5 seconds
    # 4. If engine doesn't start, wait 30-60 seconds before retry
    # 5. Maximum 3 start attempts before investigating problem
    # 6. Once running, adjust throttle to operating RPM
    # 7. Turn off heaters after warmup period
    
    # SAFETY INTERLOCKS (implement in Home Assistant):
    # - Don't allow starter if generator already running (use sensor feedback)
    # - Limit start attempts (prevent repeated cranking)
    # - Ensure stop relay not active during starting
    # - Monitor battery voltage (low voltage = don't attempt start)

# ==============================================================================
# ULTRASONIC DISTANCE SENSOR
# ==============================================================================
# Measures distance to fuel surface in generator fuel tank
# Purpose: Monitor fuel level for automated refueling alerts
# Common Use: HC-SR04 or JSN-SR04T ultrasonic sensor
# ==============================================================================
# SENSOR PHYSICS:
# - Emits ultrasonic sound pulse (40 kHz, inaudible to humans)
# - Measures time for echo to return
# - Distance = (time × speed_of_sound) / 2
# - Range: Typically 2cm - 400cm (model dependent)
# - Affected by temperature, humidity, and air currents
# ==============================================================================

sensor:
  - platform: ultrasonic               # Ultrasonic distance sensor platform
    trigger_pin: GPIO22                # Pin that triggers the ultrasonic pulse
                                       # Sends a 10µs HIGH pulse to initiate measurement
                                       # Connect to sensor's TRIG pin
    echo_pin: GPIO18                   # Pin that receives the echo signal
                                       # Measures pulse width of returning echo
                                       # Connect to sensor's ECHO pin
                                       # VOLTAGE WARNING: Some HC-SR04 sensors output 5V
                                       # ESP32 GPIO is 3.3V tolerant - use voltage divider
                                       # or use 3.3V compatible sensor (JSN-SR04T)
    
    # Pulse time configuration (commented out - using default)
    #pulse_time: 0.5s                  # How long to wait for echo return
                                       # Default: 10µs trigger pulse
                                       # Longer pulse_time allows detection of distant objects
                                       # Not needed for typical fuel tank depths
    
    name: "Ultrasonic Sensor"          # Name in Home Assistant
                                       # Appears as sensor entity
                                       # Entity ID: sensor.ultrasonic_sensor
    
    update_interval: 10s               # How often to measure distance
                                       # 10 seconds = reasonable for fuel monitoring
                                       # Fuel level changes slowly, frequent updates unnecessary
                                       # More frequent = more CPU/power usage
                                       # Less frequent = slower response to changes
    
    # FUEL LEVEL CALCULATION (done in Home Assistant):
    # 1. Mount sensor at top of fuel tank, pointing down
    # 2. Measure empty tank distance (e.g., 50cm)
    # 3. Measure full tank distance (e.g., 10cm)
    # 4. Fuel level % = (empty_distance - current_distance) / (empty_distance - full_distance) × 100
    # 5. Create template sensor in HA for percentage/gallons/liters
    
    # INSTALLATION NOTES:
    # - Mount sensor perpendicular to fuel surface (avoid angled mounting)
    # - Ensure clear path to fuel (no obstructions)
    # - Fuel vapors may affect readings (sensor is NOT explosion-proof)
    # - Consider external sensor outside tank (measure tank weight instead)
    # - Splashing fuel may cause erratic readings (use smoothing filter)
    # - Some fuels (diesel) have foam that affects ultrasonic readings
    
    # ALTERNATIVE SENSORS FOR FUEL MONITORING:
    # - Float switch (simple on/off at certain level)
    # - Resistive fuel sender (like automotive gas gauge)
    # - Pressure sensor (measures fuel column pressure)
    # - Load cell (weighs entire fuel tank)
    # - Capacitive level sensor (more reliable than ultrasonic)
    
    # SAFETY WARNINGS:
    # - Ultrasonic sensors are NOT intrinsically safe
    # - Do not install inside fuel tank (explosion risk)
    # - Consider external mounting or explosion-proof enclosure
    # - Fuel vapors can accumulate and ignite from sparks
    # - Local fire codes may prohibit electronic sensors in fuel areas

# ==============================================================================
# GPIO PIN ASSIGNMENT SUMMARY
# ==============================================================================
# 
# RELAY OUTPUTS (8 channels):
# GPIO32 - Relay 1 - Tension Throttle (auto-off 1.8s)
# GPIO33 - Relay 2 - Loosen Throttle (auto-off 1.8s)
# GPIO25 - Relay 3 - Unused/Spare
# GPIO26 - Relay 4 - Unused/Spare
# GPIO27 - Relay 5 - Block Heater #1 (manual control)
# GPIO14 - Relay 6 - Block Heater #2 (manual control)
# GPIO12 - Relay 7 - Stop Generator (auto-off 2.5s, turns off heater1)
# GPIO13 - Relay 8 - Start Generator (auto-off 5s)
# 
# STATUS LED:
# GPIO23 - Onboard status LED (indicates WiFi/HA connection)
# 
# ULTRASONIC SENSOR:
# GPIO22 - Trigger pin (sends ultrasonic pulse)
# GPIO18 - Echo pin (receives reflection)
# 
# RESERVED/USED BY ESP32:
# GPIO0  - Boot mode selection (do not use for relay)
# GPIO2  - Boot mode, often has LED (do not use for relay)
# GPIO5  - SPI CS (avoid if using SPI peripherals)
# GPIO15 - Boot mode (do not use for relay)
# GPIO34-39 - Input only (cannot drive relays)
# 
# AVAILABLE FOR EXPANSION:
# GPIO4, GPIO16, GPIO17, GPIO19, GPIO21 (if not used by other peripherals)
# 
# ==============================================================================

# ==============================================================================
# ADDITIONAL NOTES AND RECOMMENDATIONS
# ==============================================================================
#
# GENERATOR START/STOP AUTOMATION SEQUENCE:
#
# COLD START SEQUENCE (Winter):
# 1. Enable block heaters (relay5, relay6) - wait 60-120 minutes
# 2. Set throttle to start position (relay1 or relay2 as needed)
# 3. Engage starter (relay8) - auto-releases after 5 seconds
# 4. Monitor for successful start (add RPM sensor or oil pressure switch)
# 5. If no start, wait 60 seconds, retry (max 3 attempts)
# 6. Once running, adjust throttle to operating speed
# 7. Disable heaters after warmup period (5-10 minutes)
# 8. Transfer load to generator (external transfer switch)
#
# NORMAL START SEQUENCE (Warm Weather):
# 1. Set throttle to start position
# 2. Engage starter (relay8)
# 3. Monitor for start
# 4. Adjust throttle to operating RPM
# 5. Transfer load
#
# SHUTDOWN SEQUENCE:
# 1. Transfer load back to utility power (external switch)
# 2. Run unloaded for cooldown period (3-5 minutes)
# 3. Reduce throttle to idle (relay2)
# 4. Activate stop solenoid (relay7) - auto-releases after 2.5s
# 5. Verify engine stopped (RPM sensor or oil pressure)
#
# RECOMMENDED ADDITIONAL SENSORS:
# - Oil pressure switch (binary sensor) - verify engine running
# - Engine temperature sensor (thermistor or DS18B20)
# - AC voltage sensor (monitor generator output voltage)
# - AC frequency sensor (monitor generator frequency)
# - Battery voltage sensor (ADC input) - prevent start on low battery
# - Vibration sensor (detect abnormal operation)
# - Hour meter (track runtime for maintenance scheduling)
#
# SAFETY INTERLOCKS TO IMPLEMENT IN HOME ASSISTANT:
# - Prevent starter activation if generator already running
# - Prevent heater operation while generator running
# - Limit consecutive start attempts (prevent starter damage)
# - Require minimum off-time between start attempts (battery recovery)
# - Emergency stop button that works even if HA is offline
# - Low fuel alarm based on ultrasonic sensor
# - High temperature shutdown
# - Low oil pressure shutdown
# - Manual/Auto mode selection (prevent automation during maintenance)
#
# MAINTENANCE REMINDERS:
# - Oil change every 50-100 hours or annually
# - Spark plug replacement (gasoline) or injector cleaning (diesel)
# - Air filter cleaning/replacement
# - Fuel stabilizer if stored long-term
# - Battery maintenance (charge, clean terminals)
# - Load test periodically (prevent wet stacking in diesel)
# - Inspect throttle linkage for wear
# - Test auto-start sequence monthly
#
# TROUBLESHOOTING:
# - Generator won't start:
#   * Check fuel level (ultrasonic sensor reading)
#   * Verify battery voltage (add voltage sensor)
#   * Check starter relay activation (listen for click)
#   * Verify throttle position
#   * Check for error codes in ESPHome logs
# - Generator starts but won't stay running:
#   * Check throttle position (may be too low)
#   * Verify fuel supply
#   * Check for air in fuel lines
# - Starter motor runs continuously:
#   * ESP32 may have crashed (check logs)
#   * Relay stuck closed (check relay board)
#   * Wiring short circuit
# - Heaters don't turn off:
#   * Check relay7 automation (should turn off relay5)
#   * Add relay6 to shutdown sequence
#   * Verify relay board operation
# - Ultrasonic sensor erratic readings:
#   * Check wiring (voltage divider if needed)
#   * Fuel splashing causing interference
#   * Sensor too close to tank sides (reflections)
#   * Add filtering/averaging in Home Assistant
#
# POWER CONSUMPTION ESTIMATES:
# - ESP32 idle: ~80mA @ 5V = 0.4W
# - ESP32 WiFi active: ~160mA @ 5V = 0.8W
# - Each relay energized: ~70mA @ 5V = 0.35W per relay
# - All 8 relays on: ~640mA @ 5V = 3.2W
# - Ultrasonic sensor: ~15mA @ 5V = 0.075W
# - Total worst case: ~5W (minimal impact on generator battery)
#
# WIRING BEST PRACTICES:
# - Use shielded cable for ultrasonic sensor (reduce interference)
# - Separate high-current relay wiring from ESP32 signal wires
# - Fuse all generator control circuits appropriately
# - Use automotive-grade connectors for vibration resistance
# - Weatherproof enclosure (generator environments are harsh)
# - Strain relief on all cable entries
# - Label all wires clearly for future troubleshooting
#
# ==============================================================================
